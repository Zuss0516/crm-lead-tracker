<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRM Lead Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;padding:2rem 1rem}
.container{max-width:900px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.title{font-size:20px;font-weight:600;display:flex;align-items:center;gap:8px}
.add-btn{display:flex;align-items:center;gap:6px;font-size:13px;padding:8px 16px;border:1px solid #d0d0c8;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer;font-weight:500}
.add-btn:hover{background:#f0f0ea}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.stat{background:#fff;border-radius:8px;padding:14px 16px;border:1px solid #e8e8e0}
.stat-label{font-size:12px;color:#888;margin-bottom:4px}
.stat-val{font-size:24px;font-weight:600;color:#1a1a1a}
.filters{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.filter-btn{font-size:12px;padding:5px 14px;border:1px solid #e0e0d8;border-radius:20px;background:#fff;color:#888;cursor:pointer}
.filter-btn.active{border-color:#1a1a1a;color:#1a1a1a;font-weight:600}
.search{margin-left:auto;font-size:13px;padding:6px 12px;border:1px solid #e0e0d8;border-radius:8px;background:#fff;color:#1a1a1a;width:200px;outline:none}
.search:focus{border-color:#888}
.card{background:#fff;border-radius:12px;border:1px solid #e8e8e0;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
th{text-align:left;font-size:11px;font-weight:600;color:#999;padding:10px 14px;border-bottom:1px solid #f0f0e8;text-transform:uppercase;letter-spacing:.05em}
td{padding:12px 14px;border-bottom:1px solid #f5f5f0;color:#1a1a1a;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
.name-cell{display:flex;align-items:center;gap:10px}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.badge-new{background:#E6F1FB;color:#0C447C}
.badge-contacted{background:#FAEEDA;color:#633806}
.badge-qualified{background:#EEEDFE;color:#3C3489}
.badge-closed{background:#EAF3DE;color:#27500A}
.badge-lost{background:#FCEBEB;color:#791F1F}
.action-btn{font-size:12px;padding:4px 10px;border:1px solid #e8e8e0;border-radius:6px;background:transparent;color:#888;cursor:pointer;margin-right:4px}
.action-btn:hover{background:#f5f5f0;color:#1a1a1a}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);align-items:center;justify-content:center;z-index:100}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:1.5rem;width:340px;border:1px solid #e8e8e0}
.modal h3{font-size:16px;font-weight:600;margin-bottom:1.25rem}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:#888;margin-bottom:5px;font-weight:500}
.field input,.field select{width:100%;font-size:13px;padding:8px 10px;border:1px solid #e0e0d8;border-radius:7px;background:#fff;color:#1a1a1a;outline:none}
.field input:focus,.field select:focus{border-color:#888}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}
.btn-primary{font-size:13px;padding:8px 18px;border:none;border-radius:7px;background:#1a1a1a;color:#fff;cursor:pointer;font-weight:500}
.btn-primary:hover{background:#333}
.btn-ghost{font-size:13px;padding:8px 18px;border:1px solid #e0e0d8;border-radius:7px;background:transparent;color:#888;cursor:pointer}
.btn-ghost:hover{background:#f5f5f0}
.empty{text-align:center;padding:3rem;color:#bbb;font-size:14px}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}.search{width:100%;margin-left:0}.filters{gap:6px}}
</style>
</head>
<body>
<div class="container">

<div class="header">
  <div class="title"><i class="ti ti-chart-bar"></i> Lead Tracker</div>
  <button class="add-btn" onclick="openModal()"><i class="ti ti-plus"></i> Add lead</button>
</div>

<div class="stats" id="stats"></div>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" onclick="setFilter('New',this)">New</button>
  <button class="filter-btn" onclick="setFilter('Contacted',this)">Contacted</button>
  <button class="filter-btn" onclick="setFilter('Qualified',this)">Qualified</button>
  <button class="filter-btn" onclick="setFilter('Closed',this)">Closed</button>
  <button class="filter-btn" onclick="setFilter('Lost',this)">Lost</button>
  <input class="search" type="text" placeholder="Search leads..." oninput="setSearch(this.value)"/>
</div>

<div class="card">
<table>
  <thead>
    <tr>
      <th style="width:26%">Name</th>
      <th style="width:20%">Service</th>
      <th style="width:13%">Value</th>
      <th style="width:13%">Status</th>
      <th style="width:16%">Follow-up</th>
      <th style="width:12%">Actions</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>
</div>

</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h3 id="modal-title">Add lead</h3>
    <div class="field"><label>Name</label><input id="f-name" type="text" placeholder="Client name"/></div>
    <div class="field"><label>Service</label><input id="f-service" type="text" placeholder="e.g. Ceramic Coating"/></div>
    <div class="field"><label>Value (USD)</label><input id="f-value" type="number" placeholder="e.g. 2500"/></div>
    <div class="field"><label>Status</label>
      <select id="f-status">
        <option>New</option><option>Contacted</option><option>Qualified</option><option>Closed</option><option>Lost</option>
      </select>
    </div>
    <div class="field"><label>Follow-up date</label><input id="f-followup" type="date"/></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveLead()">Save</button>
    </div>
  </div>
</div>

<script>
const AVATARBG=['#E6F1FB','#EEEDFE','#E1F5EE','#FAEEDA','#FBEAF0','#FCEBEB'];
const AVATARTX=['#0C447C','#3C3489','#085041','#633806','#72243E','#791F1F'];

let leads=[
  {id:1,name:'Marco Reyes',service:'PPF Full Wrap',value:4800,status:'Qualified',followup:'2026-06-03'},
  {id:2,name:'Angela Cruz',service:'Ceramic Coating',value:2200,status:'New',followup:'2026-06-01'},
  {id:3,name:'Derek Santos',service:'Window Tint',value:850,status:'Contacted',followup:'2026-06-02'},
  {id:4,name:'Lena Park',service:'Vinyl Wrap',value:3500,status:'Closed',followup:''},
  {id:5,name:'James Villanueva',service:'PPF Hood',value:1100,status:'Lost',followup:''},
  {id:6,name:'Sofia Mendoza',service:'Ceramic Coating',value:2600,status:'Contacted',followup:'2026-06-05'},
];
let nextId=7,filterStatus='all',searchQ='',editId=null;

function initials(n){return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}
function avatarColor(n){let i=n.charCodeAt(0)%AVATARBG.length;return[AVATARBG[i],AVATARTX[i]]}
function isOverdue(d){if(!d)return false;return new Date(d)<new Date(new Date().toDateString())}

function renderStats(){
  const total=leads.length;
  const pipeline=leads.filter(l=>['New','Contacted','Qualified'].includes(l.status)).reduce((a,b)=>a+b.value,0);
  const closed=leads.filter(l=>l.status==='Closed').length;
  const overdue=leads.filter(l=>l.followup&&isOverdue(l.followup)).length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-label">Total leads</div><div class="stat-val">${total}</div></div>
    <div class="stat"><div class="stat-label">Pipeline value</div><div class="stat-val">$${pipeline.toLocaleString()}</div></div>
    <div class="stat"><div class="stat-label">Closed</div><div class="stat-val">${closed}</div></div>
    <div class="stat"><div class="stat-label">Overdue follow-ups</div><div class="stat-val" style="color:#c0392b">${overdue}</div></div>`;
}

function renderTable(){
  let rows=leads.filter(l=>{
    if(filterStatus!=='all'&&l.status!==filterStatus)return false;
    if(searchQ&&!l.name.toLowerCase().includes(searchQ.toLowerCase())&&!l.service.toLowerCase().includes(searchQ.toLowerCase()))return false;
    return true;
  });
  document.getElementById('tbody').innerHTML=rows.length?rows.map(l=>{
    const[ab,at]=avatarColor(l.name);
    const overdue=isOverdue(l.followup);
    return`<tr>
      <td><div class="name-cell"><div class="avatar" style="background:${ab};color:${at}">${initials(l.name)}</div>${l.name}</div></td>
      <td style="color:#666">${l.service}</td>
      <td>$${l.value.toLocaleString()}</td>
      <td><span class="badge badge-${l.status.toLowerCase()}">${l.status}</span></td>
      <td>${l.followup?`<span style="${overdue?'color:#c0392b;font-weight:600':''}">${l.followup}</span>`:'<span style="color:#ccc">—</span>'}</td>
      <td>
        <button class="action-btn" onclick="openModal(${l.id})" aria-label="Edit"><i class="ti ti-edit"></i></button>
        <button class="action-btn" onclick="deleteLead(${l.id})" aria-label="Delete"><i class="ti ti-trash"></i></button>
      </td></tr>`;
  }).join(''):`<tr><td colspan="6"><div class="empty">No leads found</div></td></tr>`;
  renderStats();
}

function setFilter(f,btn){filterStatus=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderTable();}
function setSearch(v){searchQ=v;renderTable();}

function openModal(id=null){
  editId=id;
  const l=id?leads.find(x=>x.id===id):null;
  document.getElementById('modal-title').textContent=id?'Edit lead':'Add lead';
  document.getElementById('f-name').value=l?l.name:'';
  document.getElementById('f-service').value=l?l.service:'';
  document.getElementById('f-value').value=l?l.value:'';
  document.getElementById('f-status').value=l?l.status:'New';
  document.getElementById('f-followup').value=l?l.followup:'';
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');editId=null;}
function deleteLead(id){if(confirm('Remove this lead?')){leads=leads.filter(l=>l.id!==id);renderTable();}}
function saveLead(){
  const name=document.getElementById('f-name').value.trim();
  const service=document.getElementById('f-service').value.trim();
  const value=parseInt(document.getElementById('f-value').value)||0;
  const status=document.getElementById('f-status').value;
  const followup=document.getElementById('f-followup').value;
  if(!name)return alert('Name is required.');
  if(editId){leads=leads.map(l=>l.id===editId?{...l,name,service,value,status,followup}:l);}
  else{leads.push({id:nextId++,name,service,value,status,followup});}
  closeModal();renderTable();
}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
renderTable();
</script>
</body>
</html>
